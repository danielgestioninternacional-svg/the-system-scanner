name: The System v2 — Daily Scanner

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/scanner.py

      - name: Upload signals CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-log-${{ github.run_number }}
          path: signals_log.csv
          if-no-files-found: ignore
          retention-days: 90

      - name: Commit signals CSV
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add signals_log.csv || true
          git diff --staged --quiet || git commit -m "📊 Signals log $(date +'%Y-%m-%d')"
          git push || true
